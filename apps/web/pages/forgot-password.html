<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password • Animyx</title>
    <link rel="icon" href="/images/favicon.png" />
    <meta name="description" content="Recover your Animyx account password.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Auth Styles -->
    <link rel="stylesheet" href="/css/auth.css">
    <style>
        .forgot-container {
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            background-color: rgba(13, 22, 40, 0.75);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 32px;
            padding: 3.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                0 0 40px rgba(139, 92, 246, 0.15),
                inset 0 0 20px rgba(139, 92, 246, 0.05);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .forgot-container.animate-enter {
            opacity: 1;
            transform: translateY(0);
        }

        /* Texture / Grain Effect */
        .forgot-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        .forgot-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .forgot-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--auth-primary), var(--auth-accent));
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #fff;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
            transform: rotate(-5deg);
        }

        .success-state {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 4rem;
            color: #22c55e;
            margin-bottom: 1.5rem;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--auth-text);
            border-radius: 100px;
            padding: 1rem;
            width: 100%;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="auth-page">
    <div class="forgot-container">
        <!-- Request State -->
        <div id="request-state">
            <div class="forgot-header">
                <div class="forgot-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="auth-welcome" style="font-size: 2rem; margin-bottom: 0.5rem;">RECOVER ACCESS</h1>
                <p class="auth-switch">Enter your email and we'll send a reset link.</p>
            </div>

            <!-- Backend Error -->
            <div id="backend-error" class="backend-error" role="alert" aria-live="polite" style="margin-bottom: 1.5rem;"></div>

            <form id="forgot-password-form" class="auth-form-minimal">
                <div class="form-group-minimal">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="auth-input" placeholder="example@gmail.com" required title="Email Address">
                </div>

                <button type="submit" id="forgot-btn" class="btn-minimal-submit">
                    <span class="btn-text">Send Recovery Link</span>
                    <div class="spinner"></div>
                </button>

                <a href="signin.html" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i>&nbsp; Back to Sign In
                </a>
            </form>
        </div>

        <!-- Success State -->
        <div id="success-state" class="success-state">
            <div class="success-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h2 class="auth-welcome" style="font-size: 1.8rem; margin-bottom: 1rem;">LINK SENT!</h2>
            <p class="auth-switch" style="margin-bottom: 2rem;">Check your inbox for a password reset link. It might take a minute or two.</p>
            
            <a href="signin.html" class="btn-minimal-submit" style="text-decoration: none; display: block; text-align: center;">
                Return to Sign In
            </a>
            
            <p class="auth-switch" style="margin-top: 2rem; font-size: 0.8rem;">
                Didn't receive an email? <a href="#" id="resend-link">Try again</a>
            </p>
        </div>
    </div>

    <script src="/env.js"></script>
    <script type="module" src="../src/features/auth/signinEnhancements.js"></script>
    <script type="module" src="../src/features/auth/auth.js"></script>
</body>
</html>
