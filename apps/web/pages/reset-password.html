<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • Animex</title>
  <link rel="icon" href="/images/favicon.png" />
    <meta name="description" content="Set a new password for your Animex account.">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0B0C13">
    <link rel="apple-touch-icon" href="/images/favicon.png">
</head>
<body class="auth-page">
    <div class="auth-split">
        <div class="auth-art-panel">
            <canvas id="auth-particles"></canvas>
            <img src="/images/signin_anime.png" alt="Anime art" class="art-img">
            <a href="signin.html" class="art-logo" aria-label="Back to sign in">
                <div class="art-logo-icon"><i class="fas fa-play"></i></div>
                <span class="art-logo-text">ANIMEX</span>
            </a>
            <div class="art-panel-content">
                <p class="art-tagline">Secure Your<br>Otaku Account</p>
                <p class="art-sub">Set a strong password to keep your library and profile protected.</p>
            </div>
        </div>
        <div class="auth-form-panel">
            <div class="auth-form-inner" id="auth-form-inner">
                <div class="auth-header">
                    <p class="auth-greeting">Password recovery</p>
                    <h1 class="auth-title">Set New Password</h1>
                    <p class="auth-subtitle">Enter your new password and confirm it below.</p>
                </div>

                <div id="backend-error" class="backend-error" role="alert" aria-live="polite"></div>

                <form id="reset-form" class="auth-form-body" novalidate>
                    <div class="form-group">
                        <input type="password" id="new-password" class="auth-input" autocomplete="new-password"
                            minlength="8" required aria-describedby="new-password-error">
                        <i class="fas fa-lock input-icon"></i>
                        <label for="new-password" class="floating-label">New Password (min 8 chars)</label>
                        <button type="button" class="toggle-password" data-target="new-password" tabindex="-1"
                            aria-label="Toggle password visibility" aria-pressed="false">
                            <i class="fas fa-eye"></i>
                        </button>
                        <span class="input-error" id="new-password-error" aria-live="polite"></span>
                    </div>

                    <div class="form-group">
                        <input type="password" id="confirm-password" class="auth-input" autocomplete="new-password"
                            minlength="8" required aria-describedby="confirm-password-error">
                        <i class="fas fa-lock input-icon"></i>
                        <label for="confirm-password" class="floating-label">Confirm New Password</label>
                        <button type="button" class="toggle-password" data-target="confirm-password" tabindex="-1"
                            aria-label="Toggle password visibility" aria-pressed="false">
                            <i class="fas fa-eye"></i>
                        </button>
                        <span class="input-error" id="confirm-password-error" aria-live="polite"></span>
                    </div>

                    <div class="auth-actions">
                        <button type="submit" id="reset-btn" class="btn-primary">
                            <span class="btn-text"><i class="fas fa-key"></i>&nbsp; Update Password</span>
                            <div class="spinner"></div>
                        </button>
                    </div>

                    <div class="auth-footer">
                        Remembered it? <a href="signin.html" class="auth-link">Back to Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="/env.js"></script>
    <script type="module" src="../src/features/auth/signinEnhancements.js"></script>
    <script type="module" src="../src/features/auth/resetPassword.js"></script>
</body>
</html>
